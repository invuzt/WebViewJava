name: Build Ultra Light APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Native Android Project Structure
        run: |
          mkdir -p android-app/app/src/main/java/com/demoapp/app
          mkdir -p android-app/app/src/main/assets
          mkdir -p android-app/gradle/wrapper

          # Salin file HTML murni milikmu ke folder assets Android
          cp -r dist/* android-app/app/src/main/assets/

          # 1. SETTINGS.GRADLE (Kasih tahu Gradle untuk cari plugin di server Google)
          cat << 'INNER_EOF' > android-app/settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          INNER_EOF

          # 2. BUILD.GRADLE UTAMA
          cat << 'INNER_EOF' > android-app/build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          INNER_EOF

          # 3. BUILD.GRADLE MODUL APP
          cat << 'INNER_EOF' > android-app/app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.demoapp.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.demoapp.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
                  debug {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
          }
          INNER_EOF

          # 4. ANDROIDMANIFEST.XML
          cat << 'INNER_EOF' > android-app/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="DemoApp"
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          INNER_EOF

          # 5. MAINACTIVITY.JAVA
          cat << 'INNER_EOF' > android-app/app/src/main/java/com/demoapp/app/MainActivity.java
          package com.demoapp.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          INNER_EOF

      - name: Initialize Gradle Wrapper
        run: |
          cd android-app
          gradle wrapper --gradle-version 8.5

      - name: Build Super Light APK
        run: |
          cd android-app
          ./gradlew assembleDebug

      - name: Upload Ultra Light APK
        uses: actions/upload-artifact@v4
        with:
          name: UltraLight-APK
          path: android-app/app/build/outputs/apk/debug/*.apk
